<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>Quorix</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4592462118276818" crossorigin="anonymous"></script>
  <style>
    :root{
      --ascend-blue:#4A8CFF;
      --electric-blue:#6FA3FF;
      --midnight:#0A0F1A;
      --glass:rgba(255,255,255,0.15);
      --ink:#00000033;
      --text-high:#E8F0FF;
      --text-mid:#B5C2D9;
      --text-low:#95A4BD;
      --radius-hero:22px;
      --radius-card:18px;
      --radius-pill:14px;
      --shadow-hero:0 20px 60px rgba(0,0,0,.35);
      --shadow-card:0 12px 40px rgba(0,0,0,.30);
      --shadow-hover:0 24px 60px rgba(0,0,0,.40);
      --border-glass:1px solid rgba(255,255,255,.18);
      --border-card:1px solid rgba(255,255,255,.12);
      --blur:22px;
      --ease:smoothstep, cubic-bezier(.2,.8,.2,1);
    }
    @media (prefers-reduced-motion:no-preference){
      :root{ --ease:cubic-bezier(.2,.8,.2,1); }
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text","Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 50% -10%, rgba(74,140,255,.20), transparent 70%),
                  radial-gradient(1200px 700px at 50% 110%, rgba(15,30,60,.80), transparent 65%),
                  linear-gradient(to bottom, rgba(10,15,26,1) 0%, rgba(10,15,26,.85) 50%, rgba(10,15,26,1) 100%);
      color:var(--text-high);
      overflow:hidden;
    }
    .app-shell{
      position:fixed;
      inset:0;
      display:grid;
      grid-template-rows:auto 1fr;
    }
    .app-header{
      position:fixed;
      top:0; left:0; right:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 24px;
      pointer-events:none;
    }
    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
    }
    .hero-inner{
      width:min(1100px, 92vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:26px;
      transform:translateY(-25vh);
      transition:transform .5s var(--ease);
      will-change:transform;
    }
    .hero.results-active .title{
      transform:translateY(-10px);
    }
    .title{
      font-size: clamp(42px, 7.2vw, 92px);
      font-weight:800;
      letter-spacing:-0.02em;
      line-height:1.02;
      text-align:center;
      background: linear-gradient(180deg, var(--text-high), var(--text-mid));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      filter: drop-shadow(0 2px 12px rgba(74,140,255,.12));
      transition: transform .6s var(--ease);
    }
    .search{
      position:relative;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .search-field{
      position:relative;
      width:100%;
      display:flex;
      align-items:center;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: var(--border-glass);
      border-radius: var(--radius-hero);
      box-shadow: var(--shadow-hero);
      backdrop-filter: blur(var(--blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(140%);
      padding: 18px 18px 18px 22px;
      transition: transform .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease);
    }
    .search-field:focus-within{
      transform:scale(1.02);
      box-shadow: 0 30px 80px rgba(74,140,255,.35);
      border-color: rgba(74,140,255,.36);
    }
    .input{
      flex:1;
      height:56px;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text-high);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight:600;
      letter-spacing:-0.01em;
    }
    .input::placeholder{ color:var(--text-low); }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:48px; width:48px;
      border-radius:12px;
      background: linear-gradient(180deg, var(--ascend-blue), var(--electric-blue));
      color:#fff;
      border: 0;
      box-shadow: 0 8px 24px rgba(79,140,255,.45);
      cursor:pointer;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), filter .2s var(--ease);
    }
    .button:hover{ transform: translateY(-1px); box-shadow: 0 14px 36px rgba(79,140,255,.55);}
    .button:active{ transform: translateY(0); filter: saturate(90%);}
    .button svg{ width:22px; height:22px; }
    .spinner{
      position:absolute;
      right:70px;
      width:22px; height:22px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      animation: spin .8s linear infinite;
      display:none;
    }
    .loading .spinner{ display:block; }
    @keyframes spin{ to{ transform:rotate(360deg);} }
    .results{
      position:relative;
      width:100%;
      display:flex;
      flex-direction:column;
      gap:16px;
      padding: 8px 0 8px;
      max-height: 48vh;
      overflow-y:auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .results.hidden{ display:none; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: var(--border-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      padding: 18px 22px;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease), opacity .4s var(--ease);
      will-change: transform, opacity;
      opacity:0;
      transform: translateY(10px);
      animation: cardIn .5s var(--ease) forwards;
    }
    @keyframes cardIn{
      to{ opacity:1; transform: translateY(0); }
    }
    .card:hover{ transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: rgba(255,255,255,.18); }
    .card h3{
      margin:0 0 6px 0;
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight:700;
      color:var(--text-high);
    }
    .card p{
      margin:0;
      font-size: clamp(14px, 2vw, 17px);
      color:var(--text-mid);
      line-height:1.45;
    }
    .card a{
      color: var(--ascend-blue);
      text-decoration:none;
    }
    .card a:hover{ text-decoration:underline; }
    .suggestions{
      position:absolute;
      top:100%;
      left:0; right:0;
      margin-top:10px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: var(--border-card);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow:hidden;
      display:none;
    }
    .suggestions.visible{ display:block; }
    .suggestions ul{
      list-style:none;
      margin:0; padding:6px;
      max-height:300px;
      overflow:auto;
    }
    .suggestions li{
      padding:12px 14px;
      border-radius:10px;
      color:var(--text-high);
      font-weight:600;
      cursor:pointer;
      transition: background .15s var(--ease), transform .15s var(--ease);
    }
    .suggestions li:hover{ background: rgba(255,255,255,.09); transform: translateY(-1px); }
    .suggestions li.active{ background: rgba(74,140,255,.25); }
    @media (max-width: 860px){
      .hero-inner{ width:min(100%, 94vw); }
      .results{ top: calc(50vh + 120px); width:min(100%, 94vw); }
      .input{ height:50px; }
      .button{ height:44px; width:44px; }
    }
    .ad-slot{
      position:fixed;
      top:10px;
      left:10px;
      z-index:40;
      pointer-events:auto;
      width:336px;
      height:280px;
    }
    .ad-slot .adsbygoogle{ width:100%; height:100%; }
  </style>
</head>
<body>
  <div class="ad-slot">
    <ins class="adsbygoogle"
         style="display:block;width:100%;height:100%;"
         data-ad-client="ca-pub-4592462118276818"
         data-ad-slot="9152861741"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>
  <script>
    window.addEventListener('load', function(){
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
    });
  </script>
  <div class="app-shell" role="application" aria-label="Quorix"></div>
    <header class="app-header" aria-hidden="true"></header>
    <main class="hero" aria-label="Hero">
      <div class="hero-inner">
        <h1 class="title" aria-label="Quorix Title">Quorix</h1>
        <section class="search" role="search" aria-label="Search">
          <form class="search-field" id="search-form" autocomplete="off">
            <input class="input" id="query" name="q" type="text" aria-label="Search query" placeholder="Search anything with Groq…" spellcheck="false">
            <div class="spinner" id="spinner" aria-hidden="true"></div>
            <button class="button" type="submit" aria-label="Submit search">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 1 0 0-15 7.5 7.5 0 0 0 0 15Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="suggestions" id="suggestions" role="listbox" aria-label="Search suggestions"><ul></ul></div>
          </form>
        </section>
        <section class="results hidden" id="results" aria-live="polite" aria-label="Search results"></section>
      </div>
    </main>
  </div>
  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const state = {
      loading:false,
      cards:[],
      suggestions:[],
      activeSuggestion:-1
    };
    const api = {
      model() {
        const m = localStorage.getItem('GROQ_MODEL');
        return m && m.length ? m : 'llama-3.3-70b-versatile';
      },
      normalizeModel(m) {
        const s = String(m || '').toLowerCase();
        if (s === 'llama-3.3' || s === 'llama') return 'llama-3.3-70b-versatile';
        if (s === 'mixtral') return 'mixtral-8x7b-32768';
        return m;
      },
      key() {
        if (window.GROQ_API_KEY && typeof window.GROQ_API_KEY === 'string') return window.GROQ_API_KEY;
        const k = localStorage.getItem('GROQ_API_KEY');
        if (k && k.length > 10) return k;
        for (let i = 0; i < localStorage.length; i++) {
          const kk = localStorage.key(i);
          if (kk && kk.startsWith('gsk_')) {
            const v = localStorage.getItem(kk);
            if (v && v.startsWith('gsk_')) {
              localStorage.setItem('GROQ_API_KEY', v);
              try { localStorage.removeItem(kk); } catch {}
              return v;
            }
          }
        }
        return null;
      },
      async chat(prompt, opts={}) {
        const key = this.key();
        if(!key) throw new Error('Missing Groq API key');
        const body = {
          model: opts.model || this.model(),
          messages: [
            { role:'system', content: opts.system || 'You generate concise JSON arrays of results with title, description, url.' },
            { role:'user', content: prompt }
          ],
          temperature: typeof opts.temperature==='number' ? opts.temperature : 0.2,
          max_tokens: opts.max_tokens || 800,
          response_format: { type:'json_object' }
        };
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method:'POST',
          headers:{
            'Authorization':'Bearer ' + key,
            'Content-Type':'application/json'
          },
          body: JSON.stringify(body)
        });
        if(!res.ok){
          const t = await res.text();
          throw new Error('Groq error ' + res.status + ': ' + t);
        }
        const data = await res.json();
        const content = data.choices?.[0]?.message?.content || '';
        try{
          return JSON.parse(content);
        }catch(e){
          const m = content.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
          if(m) return JSON.parse(m[0]);
          throw new Error('Invalid JSON returned');
        }
      }
    };
    function renderResults(items){
      const results = $('#results');
      results.innerHTML = '';
      const frag = document.createDocumentFragment();
      const count = Math.min(items.length, 8);
      for(let i=0;i<count;i++){
        const item = items[i];
        const card = document.createElement('article');
        card.className = 'card';
        card.tabIndex = 0;
        card.style.animationDelay = (i * 80) + 'ms';
        const h = document.createElement('h3');
        if(item.url){
          const a = document.createElement('a');
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = item.title || item.url;
          h.appendChild(a);
        }else{
          h.textContent = item.title || 'Untitled';
        }
        const p = document.createElement('p');
        p.textContent = item.description || '';
        card.appendChild(h);
        card.appendChild(p);
        frag.appendChild(card);
      }
      if(!count){
        const empty = document.createElement('article');
        empty.className = 'card';
        const h = document.createElement('h3'); h.textContent = 'No results';
        const p = document.createElement('p'); p.textContent = 'Try a different query.';
        empty.append(h,p);
        frag.appendChild(empty);
      }
      results.appendChild(frag);
      results.classList.remove('hidden');
      $('.hero').classList.add('results-active');
    }
    function renderError(message){
      const results = $('#results');
      results.innerHTML = '';
      const card = document.createElement('article');
      card.className = 'card';
      const h = document.createElement('h3'); h.textContent = 'Error';
      const p = document.createElement('p'); p.textContent = message;
      card.append(h,p);
      results.appendChild(card);
      results.classList.remove('hidden');
      $('.hero').classList.add('results-active');
    }
    function setLoading(on){
      state.loading = !!on;
      $('#search-form').classList.toggle('loading', state.loading);
    }
    function promptForResults(query){
      return {
        results: [
          { title:'', description:'', url:'' }
        ],
        meta:{
          count: 5,
          style: 'concise'
        },
        query
      };
    }
    async function search(query){
      setLoading(true);
      try{
        const system = 'Return JSON with "results":[{ "title":string, "description":string, "url":string }]. 4-6 items. No prose.';
        const json = await api.chat(JSON.stringify(promptForResults(query)), { system, temperature:0.2, max_tokens:900 });
        const items = Array.isArray(json.results) ? json.results : (Array.isArray(json) ? json : []);
        renderResults(items);
      }catch(e){
        renderError(e.message || String(e));
      }finally{
        setLoading(false);
      }
    }
    function debounce(fn, wait){
      let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
    }
    const suggest = debounce(async function(q){
      if(!q || q.trim().length<3){ hideSuggestions(); return; }
      try{
        const system = 'Return JSON with "suggestions":[string,...]. 5 concise, diverse queries. No explanations.';
        const json = await api.chat(JSON.stringify({ query:q }), { system, temperature:0.6, max_tokens:300 });
        const list = Array.isArray(json.suggestions) ? json.suggestions.slice(0,8) : [];
        state.suggestions = list;
        state.activeSuggestion = -1;
        renderSuggestions(list);
      }catch(e){
        hideSuggestions();
      }
    }, 220);
    function renderSuggestions(items){
      const el = $('#suggestions');
      const ul = el.querySelector('ul');
      ul.innerHTML = '';
      items.forEach((txt, i)=>{
        const li = document.createElement('li');
        li.textContent = txt;
        li.role = 'option';
        li.addEventListener('click', ()=>{
          $('#query').value = txt;
          hideSuggestions();
          $('#search-form').dispatchEvent(new Event('submit', { bubbles:true, cancelable:true }));
        });
        ul.appendChild(li);
      });
      el.classList.toggle('visible', items.length>0);
    }
    function hideSuggestions(){
      $('#suggestions').classList.remove('visible');
      state.suggestions = [];
      state.activeSuggestion = -1;
    }
    function moveSuggestion(dir){
      if(!state.suggestions.length) return;
      state.activeSuggestion = Math.max(-1, Math.min(state.suggestions.length-1, state.activeSuggestion + dir));
      const lis = $$('#suggestions li');
      lis.forEach(li=>li.classList.remove('active'));
      if(state.activeSuggestion>=0) lis[state.activeSuggestion].classList.add('active');
    }
    $('#search-form').addEventListener('submit', (e)=>{
      e.preventDefault();
      const q = $('#query').value.trim();
      if(!q) return;
      hideSuggestions();
      const url = new URL(window.location.href);
      url.searchParams.set('q', q);
      history.pushState({ q }, '', url.toString());
      search(q);
    });
    $('#query').addEventListener('input', (e)=>{ suggest(e.target.value); });
    $('#query').addEventListener('keydown', (e)=>{
      if(e.key==='ArrowDown'){ e.preventDefault(); moveSuggestion(1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); moveSuggestion(-1); }
      else if(e.key==='Enter' && state.activeSuggestion>=0){
        e.preventDefault();
        const txt = state.suggestions[state.activeSuggestion];
        if(txt){
          $('#query').value = txt;
          hideSuggestions();
          $('#search-form').dispatchEvent(new Event('submit', { bubbles:true, cancelable:true }));
        }
      }else if(e.key==='Escape'){ hideSuggestions(); }
    });
    window.addEventListener('click', (e)=>{
      if(!$('#search-form').contains(e.target)) hideSuggestions();
    });
    window.addEventListener('DOMContentLoaded', ()=>{
      const url = new URL(window.location.href);
      const ak = url.searchParams.get('groq_key');
      if(ak && ak.trim()){
        localStorage.setItem('GROQ_API_KEY', ak.trim());
        url.searchParams.delete('groq_key');
        history.replaceState({ q: url.searchParams.get('q') || '' }, '', url.toString());
      }
      const mdl = url.searchParams.get('model');
      if(mdl && mdl.trim()){
        const nm = api.normalizeModel(mdl.trim());
        localStorage.setItem('GROQ_MODEL', nm);
        url.searchParams.delete('model');
        history.replaceState({ q: url.searchParams.get('q') || '' }, '', url.toString());
      }
      const q = url.searchParams.get('q');
      if(q && q.trim()){
        $('#query').value = q;
        search(q);
      }
    });
    window.addEventListener('popstate', (e)=>{
      const q = (e.state && e.state.q) || new URL(window.location.href).searchParams.get('q') || '';
      $('#query').value = q || '';
      if(q && q.trim()) search(q);
    });
    document.addEventListener('keydown', (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='k'){
        e.preventDefault();
        $('#query').focus();
        return;
      }
      if(['ArrowDown','j','ArrowUp','k','Enter'].includes(e.key)){
        if($('#results').classList.contains('hidden')) return;
        const cards = $$('#results .card');
        if(!cards.length) return;
        if(e.key==='ArrowDown' || e.key.toLowerCase()==='j'){
          e.preventDefault();
          const i = Math.max(0, Math.min(cards.length-1, cards.findIndex(c=>c===document.activeElement)+1));
          cards[i].focus();
        }else if(e.key==='ArrowUp' || e.key.toLowerCase()==='k'){
          e.preventDefault();
          const i = Math.max(0, Math.min(cards.length-1, cards.findIndex(c=>c===document.activeElement)-1));
          cards[i].focus();
        }else if(e.key==='Enter'){
          const el = document.activeElement;
          if(el && el.classList.contains('card')){
            const a = el.querySelector('a');
            if(a) a.click();
          }
        }
      }
    });
  </script>
</body>
</html>
